name: CI Pipeline

on:
  push:
    branches: [devops/integration]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-check:
    name: Backend — install & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: backend

      - name: Syntax check
        run: node --check server.js worker.js
        working-directory: backend

  frontend-build:
    name: Frontend — install & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000

  docker-build:
    name: Docker — build images (no push)
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: pingwatch-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: pingwatch-frontend:ci
          build-args: VITE_API_URL=http://localhost:5000
          cache-from: type=gha
          cache-to: type=gha,mode=max