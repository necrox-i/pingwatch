services:
  frontend:
    build: ./frontend
    container_name: frontend_app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: ${MONGO_URI}
    networks:
      - app-network

  worker:
    build: ./worker
    container_name: worker_app
    environment:
      MONGO_URI: ${MONGO_URI}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge